<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi carrito – Migas &amp; Sabores</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="catalog-page carrito-page">
  <div id="mainContent" class="page-wrapper">
    <header class="main-header">
      <div class="container header-content">
        <div class="brand">
          <div class="brand-logo-wrap">
            <img src="imagenes/logonuevo.png" alt="Migas &amp; Sabores" class="brand-logo">
          </div>
          <div class="brand-text">
            <span class="brand-name">Migas &amp; Sabores</span>
            <span class="brand-tagline" id="carrito-tagline">Mi carrito</span>
          </div>
        </div>
        <nav class="main-nav" aria-label="Navegación principal">
          <a href="#" id="carrito-volver-catalogo" class="nav-link-cart">Volver al catálogo</a>
        </nav>
      </div>
    </header>

    <main class="catalog-main carrito-main" id="carrito-page-main">
      <section class="cart-section cart-section-standalone">
        <div class="container cart-grid">
          <div class="cart-summary">
            <h2 id="carrito-titulo-pedido">Tu pedido</h2>
            <p class="cart-min-note cart-min-note--mayorista is-hidden" id="carrito-min-note">Pedido mínimo: 1 docena (12 unidades).</p>
            <div id="cart-items" class="cart-items">
              <p class="cart-empty">Todavía no agregaste productos.</p>
            </div>
            <div class="cart-total-row">
              <span>Total:</span>
              <span id="cart-total" class="cart-total-amount">$0</span>
            </div>
            <button type="button" id="btn-confirmar-pedido" class="btn btn-secondary btn-full">
              Confirmar pedido
            </button>
          </div>

          <div class="cart-form-wrapper is-hidden" id="checkout-view">
            <h3>Datos del cliente</h3>
            <form id="checkout-form" class="checkout-form">
              <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan Pérez">
              </div>
              <div class="form-group">
                <label for="telefono">Número de teléfono</label>
                <input type="tel" id="telefono" name="telefono" required placeholder="Ej: 3825 123456">
              </div>
              <div class="form-group">
                <label for="comentario">Comentario adicional (opcional)</label>
                <textarea id="comentario" name="comentario" rows="3" placeholder="Horario de entrega, aclaraciones, etc."></textarea>
              </div>
              <button type="submit" class="btn btn-primary btn-full">
                Enviar pedido por WhatsApp
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/carrito.js" defer></script>
  <script src="js/carrito-pagina.js" defer></script>
</body>
</html>
